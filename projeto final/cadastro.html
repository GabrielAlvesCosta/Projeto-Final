<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h1>Cadastro de Usuários</h1>

        <form id="cadastroForm">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite o nome" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite o e-mail" required>

            <label for="cargo">Cargo</label>
            <input type="text" id="cargo" placeholder="Digite o cargo" required>

            <label for="crm_corem">CRM/COREM</label>
            <input type="text" id="crm_corem" placeholder="Digite o CRM ou COREM">

            <label>Administrador?</label>
            <div class="opcao-admin">
                <label>
                    <input type="radio" name="admin" value="sim">
                    Sim
                </label>

                <label>
                    <input type="radio" name="admin" value="nao" checked>
                    Não
                </label>
            </div>

            <button type="submit">Cadastrar</button>
        </form>
    </div>

    <script src="js/cadastro.js"></script>
</body>
</html>
