<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Lista de Usuários</h1>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Senha</th>
                        <th>Cargo</th>
                        <th>CRM/COREM</th>
                        <th>Administrador</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaUsuarios">
                    <!-- Usuários serão inseridos pelo JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <span class="fechar">&times;</span>
            <h2>Editar Usuário</h2>
            <form id="formEditar">
                <input type="hidden" id="editId">
                
                <label for="editNome">Nome:</label>
                <input type="text" id="editNome" required>

                <label for="editEmail">E-mail:</label>
                <input type="email" id="editEmail" required>

                <label for="editSenha">Senha:</label>
                <input type="password" id="editSenha" required>

                <label for="editCargo">Cargo:</label>
                <input type="text" id="editCargo" maxlength="30" title="Máximo 30 caracteres" required>

                <label for="editCrmCorem">CRM/COREM:</label>
                <input type="text" id="editCrmCorem" placeholder="Digite o CRM ou COREM">

                <label>Administrador?</label>
                <div class="opcao-admin">
                    <label>
                        <input type="radio" name="editAdmin" value="sim">
                        Sim
                    </label>
                    <label>
                        <input type="radio" name="editAdmin" value="nao" checked>
                        Não
                    </label>
                </div>

                <button type="submit">Salvar Alterações</button>
                <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="js/usuarios.js"></script>
</body>
</html>
