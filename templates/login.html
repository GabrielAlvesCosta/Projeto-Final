<body>
    <form action="" method="post">
        <div class="content">
            <i class="fa-solid fa-circle-user" style="color: #024d04;" id="icon"></i>
            <h2>Bem vindo de volta</h2>
            <p>Inicie sessão para aceder ao seu painel de controlo.</p>
            <label for="email">CRM/coren</label>
            <input type="tel" name="email" id="" placeholder="Insira seu CRM ou Coren Ex: CRM-MA 12345 ou COREN-MA 67890" >
            <label for="senha">Senha</label>
            <input type="password" name="" id="" placeholder="Insira sua senha">

        </div>
    </form>
