<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicalPEP - Acesso ao Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .login-card {
            max-width: 450px;
            margin: 0 auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: none;
        }
        .form-message {
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
            font-weight: 600;
        }
        /* Ajuste sutil para um verde clínico mais elegante e profissional */
        .bg-clinical-green {
            background-color: #1aa260 !important;
        }
        .btn-clinical-green {
            background-color: #1aa260 !important;
            border-color: #1aa260 !important;
            color: #fff !important;
        }
        .btn-clinical-green:hover {
            background-color: #15824c !important;
            border-color: #15824c !important;
        }
        .text-clinical-green {
            color: #1aa260 !important;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-clinical-green shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <i class="bi bi-heart-pulse-fill"></i> ClinicalPEP
            </a>
            <div class="d-flex align-items-center">
                <a href="cadastro.html" class="btn btn-outline-light btn-sm fw-bold">Criar Conta Profissional</a>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="card login-card bg-white p-4 p-md-5">
                <div class="text-center mb-4">
                    <h3 class="fw-bold text-dark"><i class="bi bi-box-arrow-in-right text-clinical-green"></i> Acesso Clínico</h3>
                    <p class="text-muted small">Insira as suas credenciais para aceder ao painel</p>
                </div>

                <div class="login-fields">
                    <div class="mb-3">
                        <label for="cpf" class="form-label fw-semibold">CPF / Registro</label>
                        <input type="text" id="cpf" class="form-control form-control-lg bg-light" placeholder="Apenas números" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Senha de Acesso</label>
                        <input type="password" id="password" class="form-control form-control-lg bg-light" placeholder="Sua senha secreta" required>
                    </div>
                    <div class="d-grid">
                        <button type="button" onclick="efetuarLogin()" class="btn btn-clinical-green btn-lg fw-bold shadow-sm">Autenticar Entrada</button>
                    </div>
                    <div id="login-message" class="form-message"></div>
                </div>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted small mb-0">Primeiro acesso? <a href="cadastro.html" class="text-decoration-none fw-bold text-clinical-green">Cadastre-se aqui</a>.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center text-md-start">
            <div class="row align-items-center">
                <div class="col-md-6 mb-3 mb-md-0">
                    <h5 class="fw-bold mb-1"><i class="bi bi-heart-pulse-fill text-clinical-green"></i> ClinicalPEP</h5>
                    <p class="text-secondary small mb-0">Gestão de Prontuários e Evolução Clínica.</p>
                </div>
                <div class="col-md-6 text-md-end text-secondary small">
                    <p class="mb-1">Suporte Técnico: suporte@clinicalpep.com.br</p>
                    <p class="mb-0">&copy; 2026 ClinicalPEP - Todos os direitos reservados.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="db.js"></script>
    <script src="login.js"></script>
</body>
</html>
