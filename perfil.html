<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#e3e5e9;
}

header{
   background: #049909;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

.card{
    background:white;
    border-radius:10px;
    padding:30px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.perfil-topo{
    display:flex;
    align-items:center;
    gap:30px;
    margin-bottom:30px;
}

.foto{
    width:150px;
    height:150px;
    border-radius:50%;
    background:#ddd;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
}

.info h2{
    color:#024d04;
    margin-bottom:10px;
}

.info p{
    color:#555;
}

.formulario{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.grupo{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
}

input{
    padding:12px;
    border:1px solid #b4beca;
    border-radius:5px;
}

.botoes{
    margin-top:30px;
    display:flex;
    gap:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.salvar{
    background:#28a745;
    color:rgb(243, 240, 240);
}

.voltar{
    background:#024d04;
    color:rgb(210, 221, 214);
}

@media(max-width:768px){

.perfil-topo{
    flex-direction:column;
}

.formulario{
    grid-template-columns:1fr;
}

}

</style>

</head>
<body>

<header>
    <h1>Meu Perfil</h1>
</header>

<div class="container">

<div class="card">

<div class="perfil-topo">

<div class="foto">
👨
</div>

<div class="info">
<h2>Administrador da Clínica</h2>
<p>Sistema de Gestão de Clínica</p>
<p>Último acesso: Hoje às 14:30</p>
</div>

</div>

<form>

<div class="formulario">

<div class="grupo">
<label>Nome Completo</label>
<input type="text" id="nome">
</div>

<div class="grupo">
<label>E-mail</label>
<input type="email" id="email">
</div>

<div class="grupo">
<label>Telefone</label>
<input type="text" id="telefone">
</div>

<div class="grupo">
<label>CPF</label>
<input type="text" id="cpf">
</div>

<div class="grupo">
<label>Nova Senha</label>
<input type="password" id="senha">
</div>

<div class="grupo">
<label>Confirmar Senha</label>
<input type="password" id="confirmarSenha">
</div>
</div>

<div class="botoes">

<button type="button" class="salvar" onclick="salvarPerfil()">
Salvar Alterações
</button>
<button type="button" class="voltar" onclick="window.location.href='index.html'">
Voltar
</button>

</div>

</form>

</div>

</div>
<script>

function salvarPerfil(){

    let senha =
    document.getElementById("senha").value;

    let confirmar =
    document.getElementById("confirmarSenha").value;

    if(senha !== confirmar){
        alert("As senhas não coincidem!");
        return;
    }

    localStorage.setItem(
        "nome",
        document.getElementById("nome").value
    );

    localStorage.setItem(
        "email",
        document.getElementById("email").value
    );

    localStorage.setItem(
        "telefone",
        document.getElementById("telefone").value
    );

    localStorage.setItem(
        "cpf",
        document.getElementById("cpf").value
    );

    alert("Perfil salvo com sucesso!");
}

window.onload = function(){

        document.getElementById("nome").value =
        localStorage.getItem("nome") || "Administrador";

        document.getElementById("email").value =
        localStorage.getItem("email") || "admin@clinica.com";

        document.getElementById("telefone").value =
        localStorage.getItem("telefone") || "(98) 99999-9999";

        document.getElementById("cpf").value =
        localStorage.getItem("cpf") || "000.000.000-00";

    }
</script>

<script src="script.js"></script>
</body>
</html>
