<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prontuário Eletrônico</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#1e3a5f;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:30px auto;
}

.card{
    background:white;
    border-radius:10px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
    color:#1e3a5f;
    margin-bottom:15px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.campo{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
}

input, select, textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    resize:none;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1e3a5f;
    color:white;
    padding:12px;
}

td{
    border:1px solid #ddd;
    padding:12px;
}

tr:nth-child(even){
    background:#f8f8f8;
}

.botoes{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

.salvar{
    background:#28a745;
    color:white;
}

.imprimir{
    background:#17a2b8;
    color:white;
}

.voltar{
    background:#1e3a5f;
    color:white;
}

@media(max-width:768px){

.form-grid{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<header>
    <h1>Prontuário Eletrônico</h1>
</header>

<div class="container">

<div class="card">

<h2>Dados do Paciente</h2>

<div class="form-grid">

<div class="campo">
<label>Nome do Paciente</label>
<input type="text" value="João Silva">
</div>

<div class="campo">
<label>CPF</label>
<input type="text" value="123.456.789-00">
</div>

<div class="campo">
<label>Data de Nascimento</label>
<input type="date">
</div>

<div class="campo">
<label>Sexo</label>
<select>
<option>Masculino</option>
<option>Feminino</option>
</select>
</div>

</div>

</div>

<div class="card">

<h2>Informações Médicas</h2>

<div class="campo">
<label>Queixa Principal</label>
<textarea rows="3"></textarea>
</div>

<br>

<div class="campo">
<label>Diagnóstico</label>
<textarea rows="4"></textarea>
</div>

<br>

<div class="campo">
<label>Medicamentos Prescritos</label>
<textarea rows="4"></textarea>
</div>

<br>

<div class="campo">
<label>Observações</label>
<textarea rows="5"></textarea>
</div>

</div>

<div class="card">

<h2>Histórico de Consultas</h2>

<table>

<tr>
<th>Data</th>
<th>Médico</th>
<th>Especialidade</th>
<th>Diagnóstico</th>
</tr>

<tr>
<td>15/06/2026</td>
<td>Dr. Carlos</td>
<td>Clínico Geral</td>
<td>Consulta de Rotina</td>
</tr>

<tr>
<td>01/05/2026</td>
<td>Dra. Ana</td>
<td>Cardiologia</td>
<td>Acompanhamento</td>
</tr>

<tr>
<td>10/03/2026</td>
<td>Dr. Pedro</td>
<td>Ortopedia</td>
<td>Dor Lombar</td>
</tr>

</table>

</div>

<div class="card">

<h2>Próxima Consulta</h2>

<div class="form-grid">

<div class="campo">
<label>Data</label>
<input type="date">
</div>

<div class="campo">
<label>Horário</label>
<input type="time">
</div>

</div>

<div class="botoes">

<button class="salvar">
Salvar Prontuário
</button>

<button class="imprimir" onclick="window.print()">
Imprimir
</button>

<button class="voltar" onclick="window.location.href='index.html'">
Voltar
</button>

</div>

</div>

</div>

</body>
</html>
